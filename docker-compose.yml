services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
  frontend:
    image: python:3.9-slim
    command: sh -c "pip install streamlit requests && streamlit run app.py --server.port 8501 --server.address 0.0.0.0"
    volumes:
      - ./frontend:/app
    working_dir: /app
    ports:
      - "8501:8501"